<svg width="320" height="300" viewBox="0 0 320 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="d_bag" x1="95" y1="120" x2="225" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#252C4E"/>
      <stop offset="1" stop-color="#141830"/>
    </linearGradient>
    <linearGradient id="d_gem" x1="228" y1="70" x2="272" y2="126" gradientUnits="userSpaceOnUse">
