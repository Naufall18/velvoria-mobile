  </defs>
  <!-- ground shadow -->
  <ellipse cx="160" cy="266" rx="92" ry="12" fill="#1A1F3A" fill-opacity="0.07"/>
  <!-- handle -->
  <path d="M120 128 C120 82 200 82 200 128" stroke="url(#d_gold)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- bag body -->
  <path d="M96 122 H224 a10 10 0 0 1 10 10 l-8 108 a16 16 0 0 1 -16 14 H110 a16 16 0 0 1 -16 -14 l-8 -108 a10 10 0 0 1 10 -10 Z" fill="url(#d_bag)"/>
