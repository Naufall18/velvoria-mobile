  </g>
  <!-- sparkles -->
  <path d="M64 96 l3 10 10 3 -10 3 -3 10 -3 -10 -10 -3 10 -3 Z" fill="#C5A572"/>
  <path d="M210 250 l2.5 8 8 2.5 -8 2.5 -2.5 8 -2.5 -8 -8 -2.5 8 -2.5 Z" fill="#E8B4A0"/>
  <circle cx="86" cy="180" r="4" fill="#E8B4A0" fill-opacity="0.8"/>
