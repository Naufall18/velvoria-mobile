  <!-- gold V emblem on bag -->
  <path d="M128 168 L142 168 L160 214 L160 232 Z" fill="url(#d_gold)"/>
  <path d="M192 168 L178 168 L160 214 L160 232 Z" fill="#C5A572"/>
